name: password-leak-mitigation
type: shell
commands:
- echo '#!/usr/bin/bash' > /.system/usr/bin/__clear_first_setup_steps
- echo 'echo "" > /etc/org.vanillaos.FirstSetup.commands' >> /.system/usr/bin/__clear_first_setup_steps
- chmod +x /.system/usr/bin/__clear_first_setup_steps
- echo '[Unit]' > /.system/etc/systemd/system/clear-first-setup-steps.service
- echo 'After=local-fs.target' > /.system/etc/systemd/system/clear-first-setup-steps.service
- echo '' > /.system/etc/systemd/system/clear-first-setup-steps.service
- echo '[Service]' > /.system/etc/systemd/system/clear-first-setup-steps.service
- echo 'ExecStart=/usr/bin/__clear_first_setup_steps' > /.system/etc/systemd/system/clear-first-setup-steps.service
- echo 'Type=oneshot' > /.system/etc/systemd/system/clear-first-setup-steps.service
- mkdir -p /.system/etc/systemd/system/local-fs.target.wants
- ln -s ../clear-first-setup-steps.service /.system/etc/systemd/system/local-fs.target.wants/
- chmod +x /.system/etc/systemd/system/clear-first-setup-steps.service
